model: "deepseek/deepseek-v4-pro"
api_base: ${oc.env:LLM_API_BASE}
api_key: ${oc.env:LLM_API_KEY}
max_tokens: 384000 # max tokens number for model to output
streaming: true
temperature: 1.0
presence_penalty: 0.0
frequency_penalty: 0.0
# Optional DeepSeek thinking mode override: enabled|disabled.
# See: https://api-docs.deepseek.com/guides/thinking_mode
thinking: "enabled"
# Print model chain-of-thought in the CLI when the API returns reasoning_content.
show_reasoning: true
